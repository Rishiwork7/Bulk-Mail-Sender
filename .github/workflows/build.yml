name: Build Windows EXE

# Yeh line allow karegi ki aap manually button daba kar build run kar sako
on:
  workflow_dispatch: 

jobs:
  build-windows:
    # Hum GitHub se ek free Windows computer maang rahe hain
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller html2image pillow weasyprint google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Build EXE using your batch file
        run: |
          # 1. Forcefully delete any existing spec or build files (Clean Slate)
          if exist *.spec del /f /q *.spec
          if exist build rmdir /s /q build
          if exist dist rmdir /s /q dist

          # 2. Run the build script
          call ./build_exe.bat
        shell: cmd

      - name: Upload EXE for Download
        uses: actions/upload-artifact@v4
        with:
          name: Rox-Invoice-App-Windows
          path: dist/
